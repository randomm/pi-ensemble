name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please's `prerelease` flag only affects releases whose version
      # *string* is itself a prerelease (e.g. 0.2.0-alpha.1). We want clean
      # SemVer (0.1.1, 0.1.2, ...) while flagging every 0.x.y release as a
      # GitHub Pre-release until we cross 1.0.0. Flip the badge post-hoc.
      - name: Mark 0.x releases as Pre-release
        if: ${{ steps.release.outputs.release_created == 'true' && steps.release.outputs.major == '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --prerelease
